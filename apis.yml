description: >-
  Nasdaq Calypso Migration services support financial institutions in migrating
  data and configurations between Calypso environments. Calypso (formerly
  Adenza / Calypso Technology) is a cross-asset front-to-back capital markets
  technology platform used by banks, asset managers, central banks, and
  clearing houses worldwide. Migration capabilities cover upgrading between
  Calypso versions, moving between on-premise and cloud deployments, and
  consolidating multiple Calypso installations. These services are delivered
  through Nasdaq professional services rather than a public developer API.
